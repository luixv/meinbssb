<!DOCTYPE html>
<html lang="de">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="meinbssb">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Mein BSSB</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Disable service worker
    const serviceWorkerVersion = null;
    
    // Clear all cookies, localStorage, and sessionStorage on page load
    (function clearAllStorage() {
      console.log('Clearing all browser storage on page load...');
      
      // Clear all cookies - more thorough approach
      function clearAllCookies() {
        // Get all cookies
        const cookies = document.cookie.split(";");
        console.log(`Found ${cookies.length} cookie(s) to clear`);
        
        // Clear cookies with different path and domain combinations
        const paths = ['/', '/bssb-token', '/api', '/email'];
        const domains = [window.location.hostname, '.' + window.location.hostname];
        
        cookies.forEach(function(cookie) {
          const cookieName = cookie.split("=")[0].trim();
          if (cookieName) {
            // Try clearing with different paths and domains
            paths.forEach(function(path) {
              domains.forEach(function(domain) {
                // Clear with domain
                document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=" + path + ";domain=" + domain;
                // Clear without domain (for current domain)
                document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=" + path;
              });
            });
            // Also try clearing with secure flag if on HTTPS
            if (window.location.protocol === 'https:') {
              paths.forEach(function(path) {
                document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=" + path + ";secure";
              });
            }
          }
        });
        
        // Also clear cookies by setting them to expire in the past
        document.cookie.split(";").forEach(function(c) { 
          const cookieName = c.replace(/^ +/, "").split("=")[0];
          if (cookieName) {
            document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
            document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;domain=" + window.location.hostname;
            document.cookie = cookieName + "=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;domain=." + window.location.hostname;
          }
        });
        
        console.log('Cookies cleared');
      }
      
      clearAllCookies();
      
      // Clear localStorage
      try {
        localStorage.clear();
        console.log('localStorage cleared');
      } catch (e) {
        console.warn('Failed to clear localStorage:', e);
      }
      
      // Clear sessionStorage
      try {
        sessionStorage.clear();
        console.log('sessionStorage cleared');
      } catch (e) {
        console.warn('Failed to clear sessionStorage:', e);
      }
      
      console.log('All storage cleared successfully');
    })();
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>

<body>
  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine({
            useColorEmoji: true,
            renderer: "html"
          }).then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>

</html>
